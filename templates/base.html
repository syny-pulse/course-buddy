<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Course Buddy — track your coursework submissions, deadlines, and grades in one place." />
  <title>{% block title %}Course Buddy: Coursework Tracker{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <link rel="preconnect" href="https://fonts.cdnfonts.com" />
  <link href="https://fonts.cdnfonts.com/css/nexa" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" aria-label="Main navigation">
    <div class="navbar__inner">
      <a href="{{ url_for('index') }}" class="navbar__brand" aria-label="Course Buddy home">
        Course Buddy
      </a>
      <div class="navbar__actions">
        <a href="{{ url_for('add') }}" class="btn btn--nav" id="nav-add-btn">
          Add Coursework
        </a>
      </div>
    </div>
  </nav>

  <!-- Flash Toasts -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="toast-wrapper" id="toast-wrapper" role="status" aria-live="polite">
        {% for category, message in messages %}
          <div class="toast toast--{{ category }}" id="toast-{{ loop.index }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- Page Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Toast auto-dismiss -->
  <script>
    (function () {
      const wrapper = document.getElementById('toast-wrapper');
      if (!wrapper) return;
      setTimeout(function () {
        wrapper.style.transition = 'opacity 0.3s ease';
        wrapper.style.opacity = '0';
        setTimeout(function () { wrapper.remove(); }, 300);
      }, 3000);
    })();
  </script>

  {% block scripts %}{% endblock %}

</body>
</html>
